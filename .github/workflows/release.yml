name: Release

# Publishes via npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
#
# One-time setup on npmjs.com (package settings → Trusted Publisher):
#   - Publisher:         GitHub Actions
#   - Organization/user: Medico-Mind
#   - Repository:        svelte-kit
#   - Workflow filename: release.yml
#
# The `id-token: write` permission lets npm mint a short-lived OIDC credential
# for this workflow run; provenance attestations are generated automatically.

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # no registry-url here: that would write an _authToken line to .npmrc,
      # which conflicts with OIDC-based trusted publishing
      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm

      # trusted publishing requires npm >= 11.5.1
      - name: Update npm
        run: npm install -g npm@latest && npm --version

      - name: Install
        run: npm ci

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
